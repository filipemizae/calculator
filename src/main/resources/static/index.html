<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Momo+Signature&family=Outfit:wght@100..900&family=Quicksand:wght@300..700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Stack+Sans+Headline:wght@200..700&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>
        <p>Calculator - Spring Boot</p>
    </header>

    <section id="calculator">

        <div id="calculator-form">

            <div id="panel">

                <h1>0</h1>

            </div>

            <div id="num_panel">

                <ul>
                    <li><button>1</button></li>
                    <li><button>2</button></li>
                    <li><button>3</button></li>
                    <li><button>4</button></li>
                    <li><button>5</button></li>
                    <li><button>6</button></li>
                    <li><button>7</button></li>
                    <li><button>8</button></li>
                    <li><button>9</button></li>
                </ul>

            </div>

            <div id="clear_panel">
                <li><button id="clear_all">Clear all</button></li>
                <li><button id="clear_unit">×</button></li>
            </div>

            <div id="operation_panel">

                <ul>
                    <li><button id="multiplication">*</button></li>
                    <li><button id="division">/</button></li>
                    <li><button id="subtraction">-</button></li>
                    <li><button id="sum">+</button></li>
                    <li><button id="result">=</button></li>
                </ul>

            </div>

        </div>

    </section>

    <footer>
        <p>© filipemizael</p>
    </footer>

</body>

<script src="script.js"></script>

</html>
